<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUTDOOR RECO</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent: #2c3e50;
            --border-color: #e0e0e0;
            --input-track: #eeeeee;
            --max-width: 480px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: var(--max-width);
            padding: 40px 24px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* Typography */
        h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 48px;
            text-align: center;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 32px;
            text-align: center;
        }

        /* Inputs */
        .input-item {
            margin-bottom: 32px;
        }

        .input-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: var(--input-track);
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        /* Buttons */
        .btn-container {
            margin-top: 48px;
        }

        button {
            display: block;
            width: 100%;
            padding: 20px;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: opacity 0.2s ease;
            margin-bottom: 12px;
        }

        button:hover {
            opacity: 0.9;
        }

        button.outline {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--text-primary);
        }

        /* Results Display */
        .result-display {
            padding: 60px 0;
            text-align: center;
        }

        .mode-title {
            font-size: 2rem;
            font-weight: 300;
            margin-bottom: 8px;
        }

        /* Modal-like Re-check */
        .recheck-box {
            text-align: center;
            padding: 40px 0;
        }

        /* Utilities */
        .value-indicator {
            font-variant-numeric: tabular-nums;
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div id="app-container">

    <!-- HOME SCREEN -->
    <section id="screen-home" class="screen active">
        <h1>Outdoor Performance</h1>
        <div style="height: 150px;"></div>
        <button onclick="navigateTo('screen-assessment')">Start Check-In</button>
    </section>

    <!-- ASSESSMENT SCREEN -->
    <section id="screen-assessment" class="screen">
        <h1>Assessment</h1>
        <div id="inputs-list">
            <!-- Inputs generated by JS -->
        </div>
        <div class="btn-container">
            <button onclick="calculateAndDisplay()">Generate Plan</button>
        </div>
    </section>

    <!-- RESULT SCREEN -->
    <section id="screen-result" class="screen">
        <h1>Recommendation</h1>
        <div class="result-display">
            <div id="result-mode" class="mode-title">--</div>
            <p id="result-desc" style="color: var(--text-secondary); font-size: 0.9rem;"></p>
        </div>
        <div class="btn-container">
            <button onclick="navigateTo('screen-session')">Start Session</button>
        </div>
    </section>

    <!-- SESSION SCREEN -->
    <section id="screen-session" class="screen">
        <h1>Session Active</h1>
        <div class="result-display">
            <div id="current-mode-label" style="font-size: 1.2rem; font-weight: 600; margin-bottom: 40px;">--</div>
            <div style="font-size: 0.8rem; color: var(--text-secondary);">Focus on the task at hand.</div>
        </div>
        <div class="btn-container">
            <button onclick="navigateTo('screen-recheck')">Session Complete?</button>
        </div>
    </section>

    <!-- RECHECK SCREEN -->
    <section id="screen-recheck" class="screen">
        <h1>Progress Check</h1>
        <div class="recheck-box">
            <p style="margin-bottom: 32px;">User Improved?</p>
            <button onclick="handleRecheck(true)">Yes</button>
            <button class="outline" onclick="handleRecheck(false)">No</button>
        </div>
    </section>

</div>

<script>
    // 1. Data Structure
    const inputs = [
        { id: 'C1', label: 'Screen Time' },
        { id: 'C2', label: 'Energy Level' },
        { id: 'C3', label: 'Current Mood' },
        { id: 'C4', label: 'Task Urgency' },
        { id: 'C5', label: 'Mental Overload' },
        { id: 'C6', label: 'Physical Fatigue' },
        { id: 'C7', label: 'Available Time' },
        { id: 'C8', label: 'Task Type (Light to Demanding)' },
        { id: 'C9', label: 'Focus Capacity' }
    ];

    const inputState = {};
    let currentRecommendedMode = "";

    // 2. Initialization
    function init() {
        const list = document.getElementById('inputs-list');
        inputs.forEach(input => {
            inputState[input.id] = 5;
            const div = document.createElement('div');
            div.className = 'input-item';
            div.innerHTML = `
                <div class="input-label">
                    <span>${input.label}</span>
                    <span class="value-indicator" id="val-${input.id}">5</span>
                </div>
                <input type="range" min="1" max="10" value="5" oninput="updateValue('${input.id}', this.value)">
            `;
            list.appendChild(div);
        });
    }

    function updateValue(id, val) {
        inputState[id] = parseInt(val);
        document.getElementById(`val-${id}`).textContent = val;
    }

    function navigateTo(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        window.scrollTo(0, 0);
    }

    // 3. Logic Implementation
    function calculateAndDisplay() {
        const threshold = 7;

        // Inverse values helper
        const inv = (val) => 11 - val;

        // D: Burnout Risk Score
        // C1, inv(C2), inv(C3), C5, C6
        const D = (inputState.C1 + inv(inputState.C2) + inv(inputState.C3) + inputState.C5 + inputState.C6) / 5;

        // E: Work Capacity Score
        // C2, C4, C7, C8, C9
        const E = (inputState.C2 + inputState.C4 + inputState.C7 + inputState.C8 + inputState.C9) / 5;

        // F: Recovery Need Score
        // inv(C3), C5, C6, D
        const F = (inv(inputState.C3) + inputState.C5 + inputState.C6 + D) / 4;

        let mode = "";

        // Decision Tree Logic
        if (D >= threshold) {
            if (inputState.C4 >= threshold) {
                mode = "Emergency Mode";
            } else {
                mode = "Protected Rest";
            }
        } else if (E >= threshold) {
            if (inputState.C8 >= threshold) {
                if (inputState.C9 >= threshold) {
                    mode = "Deep Focus Sprint";
                } else {
                    mode = "Reduced Work Mode";
                }
            } else {
                mode = "Light Task Mode";
            }
        } else {
            if (F >= threshold) {
                if (inputState.C6 >= threshold) {
                    mode = "Offline Recovery";
                } else {
                    mode = "Active Recovery";
                }
            } else {
                mode = "Reset Break";
            }
        }

        currentRecommendedMode = mode;
        document.getElementById('result-mode').textContent = mode;
        document.getElementById('current-mode-label').textContent = mode;
        navigateTo('screen-result');
    }

    function handleRecheck(improved) {
        if (improved) {
            // User Improved: Yes -> Continue -> Restart flow
            navigateTo('screen-home');
        } else {
            // User Improved: No -> Trigger Lower Intensity Mode -> Restart
            currentRecommendedMode = "Lower Intensity Mode";
            document.getElementById('result-mode').textContent = currentRecommendedMode;
            document.getElementById('current-mode-label').textContent = currentRecommendedMode;
            
            // Per instructions: "If No -> trigger Lower Intensity Mode and restart flow"
            // We immediately move to the result screen with the new mode before restarting
            navigateTo('screen-result');
        }
    }

    init();
</script>

</body>
</html>
